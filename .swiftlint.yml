disabled_rules:
  - trailing_whitespace
  - todo
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - nesting
  # SwiftUI-pattern noise:
  - multiple_closures_with_trailing_closure   # .sheet(onDismiss:){...} is canonical
  - function_parameter_count                  # data-pipe helpers pass many models intentionally
  - opening_brace                             # conflicts with SwiftFormat on multi-line where/conditions

opt_in_rules:
  - empty_count
  - first_where
  - last_where
  - sorted_first_last
  - convenience_type
  - redundant_nil_coalescing
  - explicit_init
  - closure_spacing
  - operator_usage_whitespace

analyzer_rules:
  - unused_declaration
  - unused_import

excluded:
  - .build
  - DerivedData
  - Pods
  - build

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - vm
    - v
